<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>del Pilar Nails — AI Configurator & Router Control</title>
    <style>
        :root {
            --pink: #F45CA5; --mint: #8CD9D1; --paper: #FAFAF8; --ink: #161616; --gold: #CAA24A;
        }
        * { box-sizing: border-box; }
        body { background-color: #0b0b0f; color: var(--paper); font-family: 'Karla', sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background-color: var(--ink); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 32px 0; }
        .logo-section { padding: 0 24px 32px 24px; border-bottom: 1px solid #222; }
        .logo-text { font-family: 'Archivo', sans-serif; color: var(--paper); font-size: 20px; text-transform: uppercase; margin: 0; letter-spacing: -0.5px; }
        .logo-sub { font-family: 'Space Mono', monospace; color: var(--pink); font-size: 11px; margin-top: 4px; text-transform: uppercase; font-weight: bold; }
        .nav-list { list-style: none; padding: 24px 12px; margin: 0; display: flex; flex-direction: column; gap: 6px; }
        .nav-link-back { padding: 12px 16px; color: #444; font-family: 'Space Mono', monospace; font-size: 12px; text-transform: uppercase; text-decoration: none; display: block; transition: color 0.2s; }
        .nav-link-back:hover { color: var(--pink); }
        .nav-item { width: 100%; text-align: left; border: 0; padding: 12px 16px; border-radius: 2px; color: #666; background: transparent; font-family: 'Space Mono', monospace; font-size: 12px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
        .nav-item:hover { background: #1a1a1a; color: var(--paper); }
        .nav-item.active { background: #1e1e24; color: var(--pink); font-weight: bold; border-left: 2px solid var(--pink); }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0f0f14; }
        .top-header { padding: 24px 32px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .view-area { padding: 32px; overflow-y: auto; flex: 1; }

        .realtime-ticker { background: rgba(202, 162, 74, 0.05); border: 1px dashed var(--gold); padding: 12px 16px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--gold); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .pulse-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--gold); animation: pulse 1.5s infinite; margin-right: 8px; }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .panel-card { background: var(--ink); border: 1px solid #222; padding: 24px; border-radius: 2px; }
        .section-title { font-family: 'Archivo', sans-serif; font-size: 16px; text-transform: uppercase; margin: 0 0 20px 0; border-bottom: 1px solid #222; padding-bottom: 12px; letter-spacing: 0.5px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-family: 'Space Mono', monospace; font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .input-field { width: 100%; background: #0b0b0f; border: 1px solid #333; color: var(--paper); padding: 12px; font-family: 'Space Mono', monospace; font-size: 14px; border-radius: 2px; transition: border 0.2s; }
        .input-field:focus { border-color: var(--pink); outline: none; }

        .kpi-row { display: flex; gap: 16px; margin-bottom: 24px; }
        .kpi-card { background: #1c1c22; padding: 20px; flex: 1; border: 1px solid #2d2d35; border-radius: 2px; }
        .kpi-title { font-family: 'Space Mono', monospace; font-size: 11px; color: #666; text-transform: uppercase; }
        .kpi-value { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: bold; margin-top: 6px; }

        .container-box { padding: 16px; background: #0b0b0f; border: 1px solid #222; margin-bottom: 16px; border-radius: 2px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .status-badge { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--mint); }

        .btn-submit { background: var(--pink); color: var(--ink); border: none; padding: 12px 24px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 2px; transition: opacity 0.2s; width: 100%; text-align: center; }
        .btn-submit:hover { opacity: 0.9; }
        .muted { color: #888; font-size: 12px; margin-top: 10px; }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        @media (max-width: 1000px) {
          .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="dpn-config-root" style="display: flex; width: 100vw; height: 100vh;"></div>

    <script type="text/babel">
        function ConfigControlRoom() {
            const [activeMenu, setActiveMenu] = React.useState('configurator');
            const [pricingFactor, setPricingFactor] = React.useState('1.25');
            const [basePrice, setBasePrice] = React.useState('399.00');
            const [liveRouteCount, setLiveRouteCount] = React.useState(4892);
            const [apiKey, setApiKey] = React.useState('');
            const [statusMsg, setStatusMsg] = React.useState('Ingen live-opdatering sendt endnu.');

            React.useEffect(() => {
                const interval = setInterval(() => {
                    setLiveRouteCount(prev => prev + 1);
                }, 7000);
                return () => clearInterval(interval);
            }, []);

            const gpuServices = [
                { name: 'Inkling vLLM Engine (Dockerfile.inkling)', port: '8000', specs: 'CUDA 12.8 — Local weights', status: 'Online' },
                { name: 'YOLO26 Nail Segmentation (Dockerfile.vision)', port: '8001', specs: 'FastAPI Mask Inference', status: 'Online' }
            ];

            async function postHarness(path, payload) {
                if (!apiKey.trim()) {
                    throw new Error('Manglende nøgle: indsæt ADMIN/DPN key først.');
                }
                const res = await fetch(path, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey.trim()
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || data.message || ('HTTP ' + res.status));
                return data;
            }

            const handleUpdateRules = async (e) => {
                e.preventDefault();
                try {
                    await postHarness('/api/harness/s-agents/config', {
                        kind: 'ai_repair_applied',
                        payload: {
                            source: 'harness-configurator',
                            pricingFactor: parseFloat(pricingFactor),
                            basePrice: parseFloat(basePrice)
                        },
                        source_ref: 'harness-configurator/configurator'
                    });
                    setStatusMsg('Forretnings-parametre synkroniseret live med harness bus.');
                } catch (err) {
                    setStatusMsg('Fejl: ' + err.message);
                }
            };

            const saveRouterConfig = async () => {
                try {
                    await postHarness('/api/harness/emit', {
                        agent: 's-web',
                        kind: 'ab_router_updated',
                        severity: 'notice',
                        payload: {
                            source: 'harness-configurator',
                            claudeRate: 62,
                            inklingRate: 38,
                            switchThreshold: 55
                        },
                        source_ref: 'harness-configurator/router'
                    });
                    setStatusMsg('A/B router regler sendt live.');
                } catch (err) {
                    setStatusMsg('Fejl: ' + err.message);
                }
            };

            return (
                <div style={{ display: 'flex', width: '100%', height: '100%' }}>
                    <div className="sidebar">
                        <div className="logo-section">
                            <h2 className="logo-text">del Pilar Nails</h2>
                            <div className="logo-sub">AI &amp; Config Engine</div>
                        </div>
                        <ul className="nav-list">
                            <li><a href="/harness-control.html" className="nav-link-back">⬅️ Gå til Commerce Suite</a></li>
                            <li style={{ height: '1px', background: '#222', margin: '8px 0' }}></li>
                            <li><button className={`nav-item ${activeMenu === 'configurator' ? 'active' : ''}`} onClick={() => setActiveMenu('configurator')}>💅 Konfigurator V2</button></li>
                            <li><button className={`nav-item ${activeMenu === 'router' ? 'active' : ''}`} onClick={() => setActiveMenu('router')}>🔬 A/B Model Router</button></li>
                        </ul>
                    </div>

                    <div className="main-content">
                        <div className="top-header">
                            <h2 style={{ textTransform: 'uppercase', fontSize: '16px', fontFamily: 'Archivo, Segoe UI, sans-serif', margin: 0, letterSpacing: '0.5px' }}>
                                {activeMenu === 'configurator' ? 'Konfigurator Optimering & Docker Hardware' : 'Model Router Diagnostics & Evalueringer'}
                            </h2>
                            <div style={{ fontFamily: 'Space Mono, monospace', fontSize: '11px', color: '#666' }}>
                                CORE: THREE.JS R172 + ANTHROPIC API WRAPPER
                            </div>
                        </div>

                        <div className="view-area">
                            <div className="realtime-ticker">
                                <div><span className="pulse-dot"></span>MODEL ROUTER METRICS BALANCED</div>
                                <div>api/agents/_model-router.js — {liveRouteCount} tests kørt asynkront</div>
                            </div>

                            <div className="form-group" style={{ marginBottom: '16px' }}>
                              <label>ADMIN / DPN KEY TIL INTERNE API KALD</label>
                              <input className="input-field" type="password" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} placeholder="Indsæt nøgle for live write-kald" />
                              <div className="muted">Nøglen gemmes kun i browser state på denne side.</div>
                            </div>

                            {activeMenu === 'configurator' && (
                                <div className="grid-layout">
                                    <div className="panel-card">
                                        <h3 className="section-title">Globale Forretnings-Parametre</h3>
                                        <form onSubmit={handleUpdateRules}>
                                            <div className="form-group">
                                                <label>Dynamisk Prisfaktor (Margin — Pricing-Freja)</label>
                                                <input className="input-field" type="text" value={pricingFactor} onChange={(e) => setPricingFactor(e.target.value)} />
                                            </div>
                                            <div className="form-group">
                                                <label>Bundpris for Press-on Sæt (DKK)</label>
                                                <input className="input-field" type="text" value={basePrice} onChange={(e) => setBasePrice(e.target.value)} />
                                            </div>
                                            <button className="btn-submit" type="submit">Synkronisér V2 Regelsæt</button>
                                        </form>
                                    </div>

                                    <div className="panel-card">
                                        <h3 className="section-title">GPU Container Pipelines</h3>
                                        {gpuServices.map((gpu, i) => (
                                            <div key={i} className="container-box">
                                                <div>
                                                    <div style={{ fontWeight: 'bold', fontSize: '14px', color: 'var(--paper)' }}>{gpu.name}</div>
                                                    <div style={{ fontFamily: 'Space Mono, monospace', fontSize: '11px', color: '#666', marginTop: '4px' }}>Lokal Port: {gpu.port} | {gpu.specs}</div>
                                                </div>
                                                <div className="status-badge">● {gpu.status}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeMenu === 'router' && (
                                <div>
                                    <div className="kpi-row">
                                        <div className="kpi-card">
                                            <div className="kpi-title">Claude 3.5 Sonnet Rate</div>
                                            <div className="kpi-value" style={{ color: 'var(--pink)' }}>62%</div>
                                        </div>
                                        <div className="kpi-card">
                                            <div className="kpi-title">Inkling vLLM Rate (Custom weights)</div>
                                            <div className="kpi-value" style={{ color: 'var(--mint)' }}>38%</div>
                                        </div>
                                        <div className="kpi-card">
                                            <div className="kpi-title">Auto-Switch Grænseværdi</div>
                                            <div className="kpi-value" style={{ color: 'var(--gold)' }}>&gt;55%</div>
                                        </div>
                                    </div>

                                    <div className="panel-card" style={{ borderLeft: '2px solid var(--gold)', background: 'rgba(202, 162, 74, 0.02)' }}>
                                        <h3 className="section-title" style={{ color: 'var(--gold)', borderBottom: '1px solid #2d2d20' }}>Meta-Harness Auto-Optimizer Status</h3>
                                        <p style={{ fontSize: '14px', lineHeight: '1.6', color: '#aaa', margin: 0 }}>
                                            Vores daglige auto-optimizer.js analyserer A/B-tests i real-time. Når den selvhostede
                                            Inkling LLM på port 8000 vinder over 55% af scoringerne udregnet af judges/index.js,
                                            omdirigerer systemet automatisk 100% af trafikken til vores egne vLLM Docker-containere.
                                            Dette reducerer eksterne API-regninger og sikrer autonom drift.
                                        </p>
                                        <button className="btn-submit" type="button" onClick={saveRouterConfig} style={{ marginTop: '16px' }}>Gem A/B Router Regler Live</button>
                                    </div>
                                </div>
                            )}

                            <div className="muted" style={{ marginTop: '18px' }}>{statusMsg}</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('dpn-config-root'));
        root.render(<ConfigControlRoom />);
    </script>
</body>
</html>
