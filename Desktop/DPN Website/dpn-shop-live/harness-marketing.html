<!doctype html>
<html lang="da">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>DPN Harness Marketing</title>
	<style>
		:root {
			--bg: #0a1320;
			--panel: #101b2c;
			--line: #264060;
			--text: #e8f2ff;
			--accent: #11c8ff;
			--accent2: #3cf29b;
			--muted: #9cb3ca;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(1200px 500px at 100% -20%, rgba(60,242,155,.22), transparent 60%),
				radial-gradient(900px 450px at -10% -20%, rgba(17,200,255,.22), transparent 60%),
				var(--bg);
			min-height: 100vh;
		}
		.wrap { max-width: 1200px; margin: 0 auto; padding: 28px 18px 44px; }
		.top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
		h1 { margin: 0; font-size: clamp(1.5rem, 2.9vw, 2.3rem); }
		.back {
			color: var(--text);
			text-decoration: none;
			border: 1px solid var(--line);
			background: #16283f;
			padding: 10px 14px;
			border-radius: 10px;
			display: inline-block;
		}
		.panel {
			margin-top: 16px;
			border: 1px solid var(--line);
			border-radius: 14px;
			background: color-mix(in srgb, var(--panel) 88%, #000);
			padding: 20px;
		}
		.muted { color: var(--muted); }
		.grid {
			margin-top: 14px;
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 12px;
		}
		.tile {
			border: 1px solid var(--line);
			border-radius: 12px;
			padding: 14px;
			background: #12233a;
		}
		.tile b { color: var(--accent2); }
		.tile p { margin: 8px 0 0; color: var(--muted); }
	</style>
</head>
<body>
	<main class="wrap">
		<div class="top">
			<h1>🚀 Marketing &amp; Feeds Harness</h1>
			<a class="back" href="/harness-control.html">← Tilbage til Ordrelayout</a>
		</div>

		<section class="panel">
			<div id="dpn-marketing-root">
				<p class="muted">Marketing-layout er oprettet fra bunden og klar til næste modul.</p>
				<div class="grid">
					<article class="tile">
						<b>Campaign Feed</b>
						<p>Visning af aktive kampagner og status.</p>
					</article>
					<article class="tile">
						<b>Creative Queue</b>
						<p>Kreative assets klar til publicering.</p>
					</article>
					<article class="tile">
						<b>Channel Health</b>
						<p>Overblik over performance på kanaler.</p>
					</article>
				</div>
			</div>
		</section>
	</main>
</body>
</html>
