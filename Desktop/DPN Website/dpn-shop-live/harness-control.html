<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPN Harness Control</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2e;
      --muted: #9ba3c7;
      --text: #f3f5ff;
      --pink: #ff4fa3;
      --line: #2a3153;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1e2550 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 18px 42px; }
    h1 { margin: 0 0 14px; font-size: clamp(1.4rem, 2.5vw, 2rem); }
    .card { background: color-mix(in srgb, var(--panel) 88%, #000); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .nav-list {
      list-style: none;
      margin: 0;
      padding: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
    }
    .nav-item {
      padding: 10px 14px;
      border: 1px solid #3a4270;
      border-radius: 10px;
      cursor: pointer;
      color: var(--text);
      background: #222846;
      user-select: none;
    }
    .nav-item:hover { border-color: #8f9af0; }
    .nav-item.active { border-color: var(--pink); background: #38223a; }
    .menu-link { text-decoration: none; }
    .pane { padding: 20px; }
    .muted { color: var(--muted); margin-top: 6px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>📊 DPN Control Harness</h1>
    <section class="card">
      <ul class="nav-list">
        <li class="nav-item active" data-menu="orders" onclick="setActiveMenu('orders')">📦 Ordrer</li>
        <li class="nav-item" data-menu="inventory" onclick="setActiveMenu('inventory')">🪵 Lager &amp; Råvarer</li>
        <li>
          <a href="/harness-marketing.html" class="menu-link">
            <span class="nav-item">🚀 Marketing &amp; Feeds</span>
          </a>
        </li>
      </ul>
      <div class="pane">
        <div id="orders-view">
          <h2>Ordreoversigt</h2>
          <p class="muted">Skift mellem fanerne eller hop til Marketing-siden via menuen.</p>
        </div>
        <div id="inventory-view" style="display:none;">
          <h2>Lager &amp; Råvarer</h2>
          <p class="muted">Denne visning er en basal placeholder og kan udbygges næste trin.</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    function setActiveMenu(menu) {
      var items = document.querySelectorAll('.nav-item[data-menu]');
      items.forEach(function (el) {
        el.classList.toggle('active', el.dataset.menu === menu);
      });
      document.getElementById('orders-view').style.display = menu === 'orders' ? 'block' : 'none';
      document.getElementById('inventory-view').style.display = menu === 'inventory' ? 'block' : 'none';
    }
  </script>
</body>
</html>
