<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>del Pilar Nails — Master Control Room</title>
  <style>
    :root {
      --pink: #f45ca5;
      --mint: #8cd9d1;
      --paper: #fafaf8;
      --ink: #161616;
      --gold: #caa24a;
    }
    * { box-sizing: border-box; }
    body {
      background-color: #0b0b0f;
      color: var(--paper);
      font-family: Karla, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      background-color: var(--ink);
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      padding: 32px 0;
    }
    .logo-section {
      padding: 0 24px 32px;
      border-bottom: 1px solid #222;
    }
    .logo-text {
      font-family: Archivo, "Segoe UI", sans-serif;
      color: var(--paper);
      font-size: 20px;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-family: "Space Mono", Consolas, monospace;
      color: var(--pink);
      font-size: 11px;
      margin-top: 4px;
      text-transform: uppercase;
      font-weight: bold;
    }
    .nav-list {
      list-style: none;
      padding: 24px 12px;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .nav-item {
      padding: 12px 16px;
      border-radius: 2px;
      color: #666;
      font-family: "Space Mono", Consolas, monospace;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      border: 0;
      text-align: left;
    }
    .nav-item:hover { background: #1a1a1a; color: var(--paper); }
    .nav-item.active {
      background: #1e1e24;
      color: var(--pink);
      font-weight: bold;
      border-left: 2px solid var(--pink);
    }
    .nav-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0f0f14;
    }
    .top-header {
      padding: 24px 32px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .view-area {
      padding: 32px;
      overflow-y: auto;
      flex: 1;
    }
    .realtime-ticker {
      background: rgba(140, 217, 209, 0.05);
      border: 1px dashed var(--mint);
      padding: 12px 16px;
      font-family: "Space Mono", Consolas, monospace;
      font-size: 12px;
      color: var(--mint);
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pulse-dot {
      width: 6px;
      height: 6px;
      background: var(--mint);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px var(--mint);
      animation: pulse 1.5s infinite;
      margin-right: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
      background: var(--ink);
      border: 1px solid #222;
    }
    th {
      background: #1c1c22;
      color: #666;
      font-family: "Space Mono", Consolas, monospace;
      padding: 16px;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    td {
      padding: 16px;
      border-bottom: 1px solid #222;
      color: #ddd;
    }
    tr.selected {
      background: #1c1c26 !important;
      border-left: 3px solid var(--pink);
    }
    tr:hover { background: #15151c; cursor: pointer; }
    .badge {
      font-family: "Space Mono", Consolas, monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 2px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .badge.paid { background: rgba(140, 217, 209, 0.1); color: var(--mint); border: 1px solid var(--mint); }
    .badge.open { background: rgba(244, 92, 165, 0.1); color: var(--pink); border: 1px solid var(--pink); }
    .badge.resolved { background: #222; color: #666; border: 1px solid #333; }
    .badge.kritis { background: rgba(202, 162, 74, 0.1); color: var(--gold); border: 1px solid var(--gold); }
    .badge.ok { background: rgba(140, 217, 209, 0.1); color: var(--mint); border: 1px solid var(--mint); }
    .detail-panel {
      width: 400px;
      background-color: var(--ink);
      border-left: 1px solid #222;
      padding: 32px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .detail-title {
      font-family: Archivo, "Segoe UI", sans-serif;
      font-size: 20px;
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .detail-meta {
      font-family: "Space Mono", Consolas, monospace;
      color: #666;
      font-size: 12px;
      margin-bottom: 24px;
    }
    .section-title {
      font-family: "Space Mono", Consolas, monospace;
      font-size: 11px;
      color: var(--gold);
      text-transform: uppercase;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
      margin: 24px 0 12px;
      font-weight: bold;
    }
    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .matrix-box {
      background: #1c1c22;
      padding: 8px;
      text-align: center;
      border: 1px solid #2d2d35;
      border-radius: 2px;
    }
    .matrix-box .finger {
      font-size: 10px;
      color: #666;
      font-family: "Space Mono", Consolas, monospace;
      text-transform: uppercase;
    }
    .matrix-box .val {
      font-size: 13px;
      font-weight: bold;
      color: var(--mint);
      font-family: "Space Mono", Consolas, monospace;
      margin-top: 4px;
    }
    .chat-stream {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #0b0b0f;
      padding: 16px;
      border: 1px solid #222;
      border-radius: 2px;
      max-height: 250px;
      overflow-y: auto;
    }
    .chat-bubble {
      font-size: 13px;
      line-height: 1.4;
      padding: 10px;
      border-radius: 2px;
    }
    .chat-bubble.ai {
      background: rgba(244, 92, 165, 0.05);
      border-left: 2px solid var(--pink);
      color: #eee;
    }
    .chat-bubble.user {
      background: #1c1c22;
      border-left: 2px solid #555;
      color: #ccc;
    }
    .btn-action {
      background: var(--pink);
      color: var(--ink);
      border: none;
      padding: 10px 16px;
      font-family: "Space Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      border-radius: 2px;
      margin-top: 16px;
      width: 100%;
      text-align: center;
    }
    .btn-action:hover { opacity: 0.9; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 400px;
      min-height: 0;
      height: 100%;
    }
    .panel-hidden {
      display: none;
    }
    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
    @media (max-width: 1200px) {
      .two-col {
        grid-template-columns: 1fr;
      }
      .detail-panel {
        width: 100%;
        border-left: 0;
        border-top: 1px solid #222;
      }
    }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="dpn-unified-root" style="display:flex;width:100vw;height:100vh;"></div>

  <script type="text/babel">
    function MasterControlSuite() {
      const [activeMenu, setActiveMenu] = React.useState('orders');
      const [selectedOrder, setSelectedOrder] = React.useState(null);
      const [selectedTicket, setSelectedTicket] = React.useState(null);
      const [realtimeCount, setRealtimeCount] = React.useState(14820);

      React.useEffect(() => {
        const interval = setInterval(() => {
          setRealtimeCount((prev) => prev + Math.floor(Math.random() * 2));
        }, 4000);
        return () => clearInterval(interval);
      }, []);

      const orders = [
        {
          id: '#390561',
          customer: 'Michelle Black',
          status: 'paid',
          total: '780.00 DKK',
          date: 'Jan 8',
          shape: 'Stiletto',
          color: 'Neon Pink',
          finish: 'Gel Glossy',
          sizes: { left: [16, 13, 14, 12, 10], right: [16, 13, 14, 12, 9] }
        },
        {
          id: '#663334',
          customer: 'Janice Chandler',
          status: 'delivered',
          total: '1250.00 DKK',
          date: 'Jan 6',
          shape: 'Coffin',
          color: 'Mint Glaze',
          finish: 'Matte',
          sizes: { left: [15, 12, 13, 11, 9], right: [15, 12, 13, 11, 9] }
        }
      ];

      const tickets = [
        {
          id: 'TCK-881',
          customer: 'Michelle Black',
          agent: 'Support-Karla',
          status: 'open',
          subject: 'Aendring af form',
          summary: 'Kunden oensker at skifte fra Stiletto til Almond inden produktion starter.',
          chat: [
            { r: 'user', m: 'Hej, kan jeg naa at aendre min form til Almond?' },
            { r: 'ai', m: 'Hej Michelle! Jeg har sat din ordre paa midlertidig pause, mens vi kigger paa det.' }
          ]
        },
        {
          id: 'TCK-702',
          customer: 'Anna Carter',
          agent: 'Beauty Advisor-Anja',
          status: 'resolved',
          subject: 'Farvematch raadgivning',
          summary: 'Automatisk trend-scanning foreslog Mint Glaze i stedet for traditionel groen.',
          chat: [
            { r: 'user', m: 'Hvilken farve passer til mint-tokens?' },
            { r: 'ai', m: 'Anja her! Jeg foreslaar vores signatur Mint Glaze med gel-glossy topcoat.' }
          ]
        }
      ];

      const inventory = [
        { material: 'Base Gel Gel-Glossy', status: 'OK', amount: '4.2 kg', rop: '1.5 kg' },
        { material: 'Pink Hoved-Pigment (#F45CA5)', status: 'KRITISK (ROP)', amount: '0.3 kg', rop: '0.5 kg' },
        { material: 'Mint-Pigment (#8CD9D1)', status: 'OK', amount: '1.8 kg', rop: '0.4 kg' }
      ];

      React.useEffect(() => {
        if (!selectedOrder) setSelectedOrder(orders[0]);
        if (!selectedTicket) setSelectedTicket(tickets[0]);
      }, [selectedOrder, selectedTicket]);

      const menuTitle =
        activeMenu === 'orders' ? 'Ordre-Pipeline & Logistik'
        : activeMenu === 'customer_service' ? 'AI Kundeservice & Triage Terminal'
        : 'Raavare Monitor & ROP Analyse';

      return (
        <div style={{ display: 'flex', width: '100%', height: '100%' }}>
          <div className="sidebar">
            <div className="logo-section">
              <h2 className="logo-text">del Pilar Nails</h2>
              <div className="logo-sub">Master Suite v2.0</div>
            </div>
            <ul className="nav-list">
              <li>
                <button className={`nav-item ${activeMenu === 'orders' ? 'active' : ''}`} onClick={() => setActiveMenu('orders')}>📦 Ordrer</button>
              </li>
              <li>
                <button className={`nav-item ${activeMenu === 'customer_service' ? 'active' : ''}`} onClick={() => setActiveMenu('customer_service')}>🎧 Kundeservice (AI)</button>
              </li>
              <li>
                <button className={`nav-item ${activeMenu === 'inventory' ? 'active' : ''}`} onClick={() => setActiveMenu('inventory')}>🪵 Raavare Lager</button>
              </li>
              <li><a className="nav-link" href="/harness-marketing.html"><button className="nav-item">🚀 Marketing</button></a></li>
              <li><a className="nav-link" href="/harness-agents.html"><button className="nav-item">🤖 AI Agenter</button></a></li>
              <li><a className="nav-link" href="/harness-configurator.html"><button className="nav-item">💅 AI Config & Router</button></a></li>
              
            </ul>
          </div>

          <div className="main-content">
            <div className="top-header">
              <h2 style={{ textTransform: 'uppercase', fontSize: '16px', fontFamily: 'Archivo, Segoe UI, sans-serif', margin: 0, letterSpacing: '0.5px' }}>{menuTitle}</h2>
              <div style={{ fontFamily: 'Space Mono, Consolas, monospace', fontSize: '11px', color: '#666' }}>CONTEXT-TIME: 2026-07-23 LIVE</div>
            </div>

            <div className="two-col">
              <div className="view-area">
                <div className="realtime-ticker">
                  <span><span className="pulse-dot" />REAL-TIME DATA STREAM ACTIVE</span>
                  <span>Supabase ID: sycmpguhdudyejmxxaic — {realtimeCount} interaktioner logget</span>
                </div>

                {activeMenu === 'orders' && (
                  <table>
                    <thead>
                      <tr>
                        <th>Ordre</th>
                        <th>Kunde</th>
                        <th>Status</th>
                        <th>Total</th>
                        <th>Dato</th>
                      </tr>
                    </thead>
                    <tbody>
                      {orders.map((o) => (
                        <tr key={o.id} className={selectedOrder && selectedOrder.id === o.id ? 'selected' : ''} onClick={() => setSelectedOrder(o)}>
                          <td>{o.id}</td>
                          <td>{o.customer}</td>
                          <td><span className={`badge ${o.status === 'paid' ? 'paid' : 'resolved'}`}>{o.status}</span></td>
                          <td>{o.total}</td>
                          <td>{o.date}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}

                {activeMenu === 'customer_service' && (
                  <table>
                    <thead>
                      <tr>
                        <th>Ticket</th>
                        <th>Kunde</th>
                        <th>AI Agent</th>
                        <th>Status</th>
                        <th>Emne</th>
                      </tr>
                    </thead>
                    <tbody>
                      {tickets.map((t) => (
                        <tr key={t.id} className={selectedTicket && selectedTicket.id === t.id ? 'selected' : ''} onClick={() => setSelectedTicket(t)}>
                          <td>{t.id}</td>
                          <td>{t.customer}</td>
                          <td>{t.agent}</td>
                          <td><span className={`badge ${t.status === 'open' ? 'open' : 'resolved'}`}>{t.status}</span></td>
                          <td>{t.subject}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}

                {activeMenu === 'inventory' && (
                  <table>
                    <thead>
                      <tr>
                        <th>Raavare</th>
                        <th>Status</th>
                        <th>Maengde</th>
                        <th>ROP</th>
                      </tr>
                    </thead>
                    <tbody>
                      {inventory.map((i, idx) => (
                        <tr key={`${i.material}-${idx}`}>
                          <td>{i.material}</td>
                          <td><span className={`badge ${i.status.includes('KRITISK') ? 'kritis' : 'ok'}`}>{i.status}</span></td>
                          <td>{i.amount}</td>
                          <td>{i.rop}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>

              <aside className={`detail-panel ${activeMenu === 'inventory' ? 'panel-hidden' : ''}`}>
                {activeMenu === 'orders' && selectedOrder && (
                  <>
                    <div className="detail-title">Ordre {selectedOrder.id}</div>
                    <div className="detail-meta">Kunde: {selectedOrder.customer}</div>

                    <div className="section-title">AI Konfiguration</div>
                    <div style={{ fontSize: '14px', lineHeight: '1.8' }}>
                      <div>Shape: <strong style={{ color: 'var(--pink)' }}>{selectedOrder.shape}</strong></div>
                      <div>Farve: {selectedOrder.color}</div>
                      <div>Overflade: <span style={{ fontFamily: 'Space Mono, Consolas, monospace', color: 'var(--gold)' }}>{selectedOrder.finish}</span></div>
                    </div>

                    <div className="section-title">Fit Profile Millimetermaal</div>
                    <div style={{ fontSize: '11px', fontFamily: 'Space Mono, Consolas, monospace', color: '#666', marginBottom: '8px' }}>VENSTRE HAAND</div>
                    <div className="matrix-grid">
                      {['T', 'P', 'L', 'R', 'L'].map((f, idx) => (
                        <div className="matrix-box" key={`left-${idx}`}>
                          <div className="finger">{f}</div>
                          <div className="val">{selectedOrder.sizes.left[idx]}mm</div>
                        </div>
                      ))}
                    </div>

                    <div style={{ fontSize: '11px', fontFamily: 'Space Mono, Consolas, monospace', color: '#666', marginBottom: '8px', marginTop: '10px' }}>HOEJRE HAAND</div>
                    <div className="matrix-grid">
                      {['T', 'P', 'L', 'R', 'L'].map((f, idx) => (
                        <div className="matrix-box" key={`right-${idx}`}>
                          <div className="finger">{f}</div>
                          <div className="val">{selectedOrder.sizes.right[idx]}mm</div>
                        </div>
                      ))}
                    </div>

                    <button className="btn-action" onClick={() => alert('Ordre sendt direkte til robot-fraesning og 3D-koe!')}>Godkend til Produktion</button>
                  </>
                )}

                {activeMenu === 'customer_service' && selectedTicket && (
                  <>
                    <div className="detail-title">{selectedTicket.id}</div>
                    <div className="detail-meta">Ansvarlig AI: {selectedTicket.agent}</div>

                    <div className="section-title">Triage Resyme</div>
                    <p style={{ fontSize: '14px', lineHeight: '1.4', margin: '0 0 16px 0', color: '#ccc' }}>{selectedTicket.summary}</p>

                    <div className="section-title">Real-Time Samtalelog</div>
                    <div className="chat-stream">
                      {selectedTicket.chat.map((msg, idx) => (
                        <div key={idx} className={`chat-bubble ${msg.r === 'ai' ? 'ai' : 'user'}`}>
                          <div style={{ fontFamily: 'Space Mono, Consolas, monospace', fontSize: '10px', color: '#666', marginBottom: '4px' }}>
                            {msg.r === 'ai' ? 'AI AGENT' : 'KUNDE'}
                          </div>
                          {msg.m}
                        </div>
                      ))}
                    </div>
                    <button className="btn-action" onClick={() => alert('Overtager traaden manuelt. AI-agenter sat paa pause for denne kunde.')}>Overtag Samtale Manuelt</button>
                  </>
                )}
              </aside>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('dpn-unified-root'));
    root.render(<MasterControlSuite />);
  </script>
</body>
</html>
